version: '3.8'

x-sim-base: &sim-base
  build: .
  environment:
    - BROKER_HOST=${BROKER_HOST:-34.87.254.184}
    - BROKER_PORT=8883
    - INTERVAL_S=60
    - TIME_SCALE=1.0
    - MQTT_PASS=site-pass-secret
  restart: always

services:
  site-01:
    <<: *sim-base
    environment:
      - BROKER_HOST=${BROKER_HOST:-34.87.254.184}
      - SITE_ID=site-01
      - MQTT_USER=site-01
