# Customer-view dashboard routing — paste these two location blocks ONCE into the
# existing `server { listen 443 ssl; server_name microgrid.tinylab.ai; ... }`
# block in /etc/nginx/sites-enabled/microgrid, then: nginx -t && systemctl reload nginx
#
# Customer URL form (zero per-customer config): https://microgrid.tinylab.ai/c/?c=<guid>
# The single customer-view Streamlit instance (port 8502, baseUrlPath /c) reads the
# GUID from the query string and scopes every query to cust-<guid>-%.

    location /c/_stcore/stream {
        proxy_pass         http://127.0.0.1:8502/c/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400;
    }
    location /c/ {
        proxy_pass         http://127.0.0.1:8502/c/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
