name: Deploy Cloud Run Services

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI
    inputs:
      service:
        description: 'Service to deploy (all | triage | chat | dispatch | detector)'
        required: false
        default: 'all'

env:
  PROJECT_ID: microgrid-demo
  REGION: australia-southeast1

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      triage:   ${{ steps.filter.outputs.triage   || github.event.inputs.service == 'triage'   || github.event.inputs.service == 'all' }}
      chat:     ${{ steps.filter.outputs.chat     || github.event.inputs.service == 'chat'     || github.event.inputs.service == 'all' }}
      dispatch: ${{ steps.filter.outputs.dispatch || github.event.inputs.service == 'dispatch' || github.event.inputs.service == 'all' }}
      detector: ${{ steps.filter.outputs.detector || github.event.inputs.service == 'detector' || github.event.inputs.service == 'all' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            triage:
              - 'agents/triage_agent/**'
            chat:
              - 'agents/chat_agent/**'
            dispatch:
              - 'agents/dispatch_agent/**'
            detector:
              - 'agents/anomaly_detector/**'

  # ── Auth to GCP (shared setup) ─────────────────────────────────────────────
  # Each deploy job authenticates independently using the stored SA key.

  # ── triage-agent ───────────────────────────────────────────────────────────
  deploy-triage:
    needs: changes
    if: needs.changes.outputs.triage == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy triage-agent
        run: |
          gcloud run deploy triage-agent \
            --source ./agents/triage_agent \
            --region $REGION \
            --project $PROJECT_ID \
            --service-account microgrid-agent@$PROJECT_ID.iam.gserviceaccount.com \
            --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --memory 512Mi --cpu 1 \
            --no-allow-unauthenticated \
            --quiet

  # ── chat-agent ─────────────────────────────────────────────────────────────
  deploy-chat:
    needs: changes
    if: needs.changes.outputs.chat == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy chat-agent
        run: |
          gcloud run deploy chat-agent \
            --source ./agents/chat_agent \
            --region $REGION \
            --project $PROJECT_ID \
            --service-account microgrid-agent@$PROJECT_ID.iam.gserviceaccount.com \
            --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --memory 512Mi --cpu 1 \
            --allow-unauthenticated \
            --quiet

  # ── dispatch-agent ─────────────────────────────────────────────────────────
  deploy-dispatch:
    needs: changes
    if: needs.changes.outputs.dispatch == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy dispatch-agent
        run: |
          gcloud run deploy dispatch-agent \
            --source ./agents/dispatch_agent \
            --region $REGION \
            --project $PROJECT_ID \
            --service-account microgrid-agent@$PROJECT_ID.iam.gserviceaccount.com \
            --set-secrets=SLACK_WEBHOOK_URL=slack-webhook-url:latest \
            --memory 512Mi --cpu 1 \
            --allow-unauthenticated \
            --quiet

  # ── anomaly-detector ───────────────────────────────────────────────────────
  deploy-detector:
    needs: changes
    if: needs.changes.outputs.detector == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy anomaly-detector
        run: |
          gcloud run deploy anomaly-detector \
            --source ./agents/anomaly_detector \
            --region $REGION \
            --project $PROJECT_ID \
            --service-account microgrid-agent@$PROJECT_ID.iam.gserviceaccount.com \
            --memory 512Mi --cpu 1 \
            --no-allow-unauthenticated \
            --quiet
